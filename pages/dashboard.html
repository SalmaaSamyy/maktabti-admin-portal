<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Maktabti Portal</title>
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>

    <div class="app-wrapper">
        <main class="main-content">
            <div class="page-container">
                
                <div class="dashboard-metrics-grid">
                    
                    <div class="metric-card">
                        <div class="metric-info">
                            <h3 data-i18n="total_books">Total Books & References</h3>
                            <div class="metric-number" id="lbl-metric-books">0</div>
                        </div>
                        <div class="metric-icon-box">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M4 4.5A2.5 2.5 0 0 1 6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5z"></path></svg>
                        </div>
                    </div>

                    <div class="metric-card">
                        <div class="metric-info">
                            <h3 data-i18n="pending_projects">Pending Projects Review</h3>
                            <div class="metric-number" id="lbl-metric-projects">0</div>
                        </div>
                        <div class="metric-icon-box" style="color: var(--orange);">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"></path><path d="M6 12v5c0 2 2 3 6 3s6-1 6-3v-5"></path></svg>
                        </div>
                    </div>

                    <div class="metric-card">
                        <div class="metric-info">
                            <h3 data-i18n="mobile_downloads">Mobile App Downloads</h3>
                            <div class="metric-number" id="lbl-metric-downloads">0</div>
                        </div>
                        <div class="metric-icon-box" style="color: #10b981;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                        </div>
                    </div>

                </div>

                <div class="dashboard-analytics-section">
                    
                    <div class="chart-container-card">
                        <div class="chart-card-header">
                            <h3 data-i18n="demand_forecast">Demand Forecast & Top Read Analytics</h3>
                            <div class="chart-time-filters">
                                <button class="filter-chip" data-window="daily" data-i18n="daily">Daily</button>
                                <button class="filter-chip" data-window="weekly" data-i18n="weekly">Weekly</button>
                                <button class="filter-chip active" data-window="monthly" data-i18n="monthly">Monthly</button>
                            </div>
                        </div>
                        <div id="canvas-demand-chart" class="mock-chart-canvas">
                            Analyzing systemic resource telemetry matrix...
                        </div>
                    </div>

                    <div class="overdue-alerts-card">
                        <div class="overdue-header">
                            <h3 style="color: var(--error-red); display: flex; align-items: center; gap: 8px;">
                                <span style="display:inline-block; width:10px; height:10px; background-color: var(--error-red); border-radius:50%; animation: pulse 1.5s infinite;"></span>
                                <span data-i18n="overdue_monitor">Overdue Books Inventory Guard</span>
                            </h3>
                        </div>
                        <div class="table-responsive-wrapper">
                            <table class="custom-data-table">
                                <thead>
                                    <tr>
                                        <th data-i18n="th_book">Target Book</th>
                                        <th data-i18n="th_email">Student Email</th>
                                        <th data-i18n="th_checkout">Checkout Date</th>
                                        <th data-i18n="th_expected">Expected Return</th>
                                        <th data-i18n="th_gap">Delay Gap</th>
                                    </tr>
                                </thead>
                                <tbody id="tbody-overdue-alerts">
                                    </tbody>
                            </table>
                        </div>
                    </div>

                </div>

            </div>
        </main>
    </div>

    <script src="../js/database.js"></script>
    <script src="../js/router.js"></script>
    <script src="../js/components.js"></script>
    <script src="../js/dashboard.js"></script>
</body>
</html>
