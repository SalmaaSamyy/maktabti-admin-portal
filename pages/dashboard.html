<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم والتحليلات - مكتبتي Portal</title>
    <!-- Core Cascading Stylesheets Import Modules -->
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>

    <div class="app-wrapper">
        <!-- Sidebar Navigation Element gets injected dynamically here via components.js -->

        <main class="main-content">
            <!-- Topbar Administration Header gets injected dynamically here via components.js -->

            <div class="page-container">
                
                <!-- 1. Real-Time Telemetry Metrics Counters Layout Row -->
                <div class="dashboard-metrics-grid">
                    
                    <!-- Archived Books Counter Card -->
                    <div class="metric-card">
                        <div class="metric-info">
                            <h3>إجمالي المراجع والكتب</h3>
                            <div class="metric-number" id="lbl-metric-books">0</div>
                        </div>
                        <div class="metric-icon-box">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M4 4.5A2.5 2.5 0 0 1 6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5z"></path></svg>
                        </div>
                    </div>

                    <!-- Pending Graduation Projects Review Counter Card -->
                    <div class="metric-card">
                        <div class="metric-info">
                            <h3>المشاريع قيد المراجعة</h3>
                            <div class="metric-number" id="lbl-metric-projects">0</div>
                        </div>
                        <div class="metric-icon-box" style="color: var(--orange);">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"></path><path d="M6 12v5c0 2 2 3 6 3s6-1 6-3v-5"></path></svg>
                        </div>
                    </div>

                    <!-- Total Mobile App Downloads Sync Telemetry Card -->
                    <div class="metric-card">
                        <div class="metric-info">
                            <h3>تحميلات الموبايل (التفاعل)</h3>
                            <div class="metric-number" id="lbl-metric-downloads">0</div>
                        </div>
                        <div class="metric-icon-box" style="color: #10b981;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                        </div>
                    </div>

                </div>

                <!-- 2. Dual Analytics Interface Section (Forecast Charts & Red Alert Logs) -->
                <div class="dashboard-analytics-section">
                    
                    <!-- Dynamic Demand Forecasting Visualization Component Card -->
                    <div class="chart-container-card">
                        <div class="chart-card-header">
                            <h3>مخطط التنبؤ بالطلب والأكثر قراءة</h3>
                            <div class="chart-time-filters">
                                <button class="filter-chip" data-window="daily">يومي</button>
                                <button class="filter-chip" data-window="weekly">أسبوعي</button>
                                <button class="filter-chip active" data-window="monthly">شهري</button>
                            </div>
                        </div>
                        <!-- Programmatic Target Container Node for Chart Generation script hooks -->
                        <div id="canvas-demand-chart" class="mock-chart-canvas">
                            جاري تحليل مصفوفة البيانات الضخمة للمنصة...
                        </div>
                    </div>

                    <!-- Real-Time Physical Book Overdue Alert Matrix List Card -->
                    <div class="overdue-alerts-card">
                        <div class="overdue-header">
                            <h3 style="color: var(--error-red); display: flex; align-items: center; gap: 8px;">
                                <span style="display:inline-block; width:10px; height:10px; background-color: var(--error-red); border-radius:50%; animation: pulse 1.5s infinite;"></span>
                                مراقبة عهدة المراجع المتأخرة (إنذار فوري)
                            </h3>
                        </div>
                        <div class="table-responsive-wrapper">
                            <table class="custom-data-table">
                                <thead>
                                    <tr>
                                        <th>الكتاب المستهدف</th>
                                        <th>الإيميل الجامعي للمستعير</th>
                                        <th>تاريخ خروج العهدة</th>
                                        <th>تاريخ الاستلام المجدول</th>
                                        <th>فجوة التأخير</th>
                                    </tr>
                                </thead>
                                <tbody id="tbody-overdue-alerts">
                                    <!-- Injected Dynamically with strict row-red-alert-highlight structures by dashboard.js -->
                                </tbody>
                            </table>
                        </div>
                    </div>

                </div>

            </div>
        </main>
    </div>

    <!-- Core Application Dependency Engine Scripts Hooking Layers -->
    <script src="../js/database.js"></script>
    <script src="../js/router.js"></script>
    <script src="../js/components.js"></script>
    <script src="../js/dashboard.js"></script>
</body>
</html>
